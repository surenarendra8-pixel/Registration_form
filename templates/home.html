<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Registration</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
{% load static %}
<link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

  <h3>Scan QR Code</h3>
  <img src="data:image/png;base64,{{ qr_image }}" alt="QR Code" width="200">
  
<div class="container">
  <h1>Student Registration</h1>
  <p class="subtitle">Manage and register student records below.</p>
  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>Name</th><th>Branch</th><th>College</th><th>Place</th><th>Action</th>
        </tr>
      </thead>
      <tbody>
        {% for x in info %}
        <tr>
          <td>{{ x.name }}</td>
          <td>{{ x.branch }}</td>
          <td>{{ x.college }}</td>
          <td>{{ x.place }}</td>
          <td><a class="update-btn" href="{% url 'update_reg' x.id %}">Update</a></td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
  <div class="form-card">
    <p class="form-title">Add New Student</p>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <input type="submit" value="Submit">
    </form>
  </div>
</div>
</body>
</html>
